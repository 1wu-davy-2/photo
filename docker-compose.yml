services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://root:change-me@101.43.75.72:3306/photo?charset=utf8mb4}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-18.221.246.24:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change-me}
      MINIO_BUCKET: ${MINIO_BUCKET:-yanshi}
      MINIO_ORIGIN_BUCKET: ${MINIO_ORIGIN_BUCKET:-yanshi}
      MINIO_PREVIEW_BUCKET: ${MINIO_PREVIEW_BUCKET:-yanshi-preview}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-25}
      CORS_ORIGINS: ${CORS_ORIGINS:-0.0.0.0}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-this-secret-key}
      AUTH_TOKEN_TTL_MINUTES: ${AUTH_TOKEN_TTL_MINUTES:-60}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
    ports:
      - "${BACKEND_PORT:-6555}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-6222}:80"

  mariadb:
    image: mariadb:11.8
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-photo}
      MARIADB_USER: ${MARIADB_USER:-photo_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-change-me}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-change-root-me}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mariadb_data:
